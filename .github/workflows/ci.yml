name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: never

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294

  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.87.0 --profile minimal --component clippy,rustfmt

      - name: Repository and conformance checks
        run: |
          python3 tools/check_repository_hygiene.py
          python3 tools/check_conformance.py
          python3 tools/check_architecture.py
          python3 tools/check_package_manifest.py
          python3 -m unittest discover -s tools/tests -v

      - name: Format
        run: cargo +1.87.0 fmt --all -- --check

      - name: Locked metadata
        run: cargo +1.87.0 metadata --format-version 1 --locked

      - name: Compile
        run: cargo +1.87.0 check --workspace --all-targets --all-features --locked

      - name: Clippy
        run: cargo +1.87.0 clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Tests and documentation
        run: |
          cargo +1.87.0 test --workspace --all-features --locked
          cargo +1.87.0 test --workspace --doc --locked
          cargo +1.87.0 doc --workspace --no-deps --locked

      - name: Independent vector replay
        run: python3 vectors/independent_python/replay_resource_wire_v1.py --check

  supply-chain:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.87.0 --profile minimal
          rustup toolchain install 1.88.0 --profile minimal

      - name: Install pinned policy tools
        run: |
          cargo +1.87.0 install --locked --version 0.22.1 cargo-audit
          cargo +1.88.0 install --locked --version 0.20.2 cargo-deny

      - name: Advisory and dependency policy
        run: |
          cargo +1.87.0 audit
          cargo +1.87.0 audit --file fuzz/Cargo.lock
          cargo +1.88.0 deny check
          cargo +1.88.0 deny --manifest-path fuzz/Cargo.toml check

  fuzz-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned fuzz toolchain
        run: |
          rustup toolchain install nightly-2025-03-02 --profile minimal
          cargo +1.87.0 install --locked --version 0.13.1 cargo-fuzz

      - name: Verify corpus and run changed-target smoke
        run: |
          python3 fuzz/generate_corpus.py --check
          cargo +nightly-2025-03-02 fuzz run resource_wire_v1_decode -- -seed=1 -runs=3 -max_len=16385 -timeout=5
          cargo +nightly-2025-03-02 fuzz run resource_wire_v1_decode -- -seed=1 -max_total_time=45 -max_len=16385 -timeout=5
          cargo +nightly-2025-03-02 fuzz run policy_cost_v1 -- -seed=1 -runs=3 -max_len=88 -timeout=5
          cargo +nightly-2025-03-02 fuzz run policy_cost_v1 -- -seed=1 -max_total_time=45 -max_len=88 -timeout=5

  assurance:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.87.0 --profile minimal
          rustup toolchain install nightly-2025-03-02 --profile minimal --component llvm-tools

      - name: Install pinned assurance tools
        run: |
          cargo +1.87.0 install --locked --version 0.8.5 cargo-llvm-cov
          cargo +1.87.0 install --locked --version 26.0.0 cargo-mutants

      - name: Enforce workspace and changed-core line and branch coverage
        run: |
          cargo +nightly-2025-03-02 llvm-cov --workspace --all-features --locked --branch --json --output-path target/llvm-cov-branch.json
          python3 tools/check_coverage.py target/llvm-cov-branch.json --min-lines 90 --min-branches 85
          python3 tools/check_coverage.py target/llvm-cov-branch.json --scope-prefix crates/zrm-policy --min-lines 95 --min-branches 100

      - name: Run configured mutation campaign
        run: cargo +1.87.0 mutants --workspace --timeout 10 --build-timeout 60 --jobs 2 --output target/mutants
